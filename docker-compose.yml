services:
  mongodb:
    image: mongo:latest
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/JobBoard
      - PORT=4000

  frontend:
    build: ./frontend
    ports:
      - "4000:4000"
    depends_on:
      - backend

volumes:
  mongo-data: